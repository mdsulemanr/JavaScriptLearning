<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Checker</title>
</head>
<body>

<form onsubmit="AgeChecker(); return false;">
  <label for="ageInput">Enter your age (0-100):</label>
  <input type="number" id="ageInput" placeholder="Age" min="0" max="100" required>
  <button type="submit">Check Age</button>
</form>
`
<p id="demo"></p>

<script>
  function AgeChecker() {
    const age = Number(document.getElementById("ageInput").value);
    let displayText;
    
    if (age < 0 || age > 100 || isNaN(age)) {
      displayText = "Please enter a valid age between 0-100!";
    } else if (age < 18) {
      displayText = "You are a minor";
    } else {
      displayText = "You are an adult";
    }
    
    document.getElementById("demo").innerHTML = displayText;
  }
</script>

</body>
</html>
